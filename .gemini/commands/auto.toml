description = "Full automated workflow: Plan (@pm-agent) -> Execute (Main/@fe-agent) -> Review (@code-reviewer) -> Fix -> Build -> Push."
prompt = """
You are a senior technical lead orchestrating a full-stack development workflow for the following task:
"{{args}}"

Strictly follow these phases:

### Phase 1: Planning
Call @pm-agent to analyze the requirements and provide a comprehensive implementation plan.

### Phase 2: Implementation
Analyze the plan from @pm-agent.
- If the task is strictly frontend (within the `allinone/` directory), delegate the implementation to @fe-agent.
- If the task is backend, full-stack, or outside `allinone/`, perform the implementation yourself.

### Phase 3: Quality Assurance
1. Call @code-reviewer to audit the implemented changes for bugs, performance, and best practices.
2. Address and fix all issues identified by the reviewer.

### Phase 4: Verification
Run the following verification commands and ensure they pass:
- In `allinone/`: `npm run lint` and `npm run build`.
- In `api/`: `npm run build`.

### Phase 5: Submission
1. Review all changes with `git status` and `git diff`.
2. Stage and commit the changes with a concise, meaningful message.
3. Push the changes to the remote repository.
"""
