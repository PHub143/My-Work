name: Deploy to GitHub Pages

on:
  push:
    # Triggers the workflow on push events to either main or master
    branches: ['main', 'master']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}allinone/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./allinone/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: ./allinone
      - name: Build
        run: npm run build
        working-directory: ./allinone
      - name: Prepare artifact
        run: |
          mkdir -p artifact/allinone
          cp -r allinone/dist/* artifact/allinone/
          touch artifact/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./artifact
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4